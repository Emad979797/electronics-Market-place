<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details | JSEK Marketplace</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">

    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <main class="auth-container">
        <div class="auth-card">
            <h1>Product Details</h1>

            <!-- Images -->
            <div class="input-group">
                <img src="phone1.jpg" alt="Product Image" style="width:100%; border-radius:10px;">
                <img src="phone2.jpg" alt="Product Image" style="width:100%; margin-top:10px; border-radius:10px;">     
            </div>

            <!-- Info -->
            <div class="input-group">
                <p><strong>Item Name:</strong> iphone 17 pro max</p>
                <p><strong>Category:</strong> Mobile</p>
                <p><strong>Condition:</strong> Used</p>
                <p><strong>Price:</strong> $600</p>
                <p><strong>Description:</strong> Excellent condition, no scratches, includes charger.</p>
            </div>

            <button class="btn-glow">Buy Now</button>
        </div>
    </main>

</body>
</html>
