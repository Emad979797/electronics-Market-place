<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | JSEK Marketplace</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;400;600&display=swap" rel="stylesheet">
</head>

<body class="auth-page" style="display: flex; flex-direction: column; min-height: 100vh; margin: 0;">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <header class="navbar">
        <div class="logo">JSEK <span class="logo-accent">Marketplace</span></div>
        <div class="nav-links">
            <a href="index.html" class="text-link">Home Page</a>
            <a href="support.html" class="text-link">Technical Support</a>
        </div>
    </header>

    <main class="auth-container">
        <div class="auth-card">
            <h2>Member Login</h2>
            <p>Enter your credentials to access your account.</p>

            <form id="loginForm" class="auth-form" autocomplete="off">
                <div class="input-group">
                    <input type="email" id="loginEmail" placeholder="Email Address" required
                        autocomplete="one-time-code">
                </div>

                <div class="input-group">
                    <input type="password" id="loginPassword" placeholder="Password" required
                        autocomplete="new-password">
                </div>

                <div class="input-group">
                    <select id="loginRole" required>
                        <option value="">Login as...</option>
                        <option value="buyer">Buyer</option>
                        <option value="seller">Seller</option>
                        <option value="vendor">Vendor</option>
                        <option value="admin">Admin</option>
                    </select>
                </div>

                <button type="submit" class="btn-glow">Login Now</button>
            </form>

            <div id="loginMessage" style="margin-top: 15px; font-weight: 600; font-size: 0.9rem;"></div>

            <div class="auth-footer">
                <p>Don't have an account? <a href="signup.html" class="text-link">Sign up here</a></p>
            </div>
        </div>
    </main>

    <footer class="main-footer">
    </footer>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function (e) {
            e.preventDefault();

            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const role = document.getElementById('loginRole').value;
            const message = document.getElementById('loginMessage');

            // 1. Get users from storage
            const users = JSON.parse(localStorage.getItem('jsek_users')) || [];

            // 2. Add a default "Demo Buyer" and "Demo Admin" if the storage is empty
            // This ensures buyer@jsek.com always works for your demo
            if (users.length === 0) {
                users.push({ email: "buyer@jsek.com", password: "password123", role: "buyer", fullName: "Demo Buyer" });
                users.push({ email: "admin@jsek.com", password: "admin123", role: "admin", fullName: "Demo Admin" });
                localStorage.setItem('jsek_users', JSON.stringify(users));
            }

            // 3. Find matching user
            const validUser = users.find(user =>
                user.email === email &&
                user.password === password &&
                user.role === role
            );

            if (validUser) {
                message.textContent = "Login successful! Redirecting...";
                message.style.color = "#2ecc71";

                // Save session
                localStorage.setItem('currentUser', JSON.stringify(validUser));

                setTimeout(() => {
                    // Redirect based on role
                    if (role === 'admin') {
                        window.location.href = "admin-dashboard.html";
                    } else {
                        window.location.href = "index.html";
                    }
                }, 1500);
            } else {
                message.textContent = "Error: Invalid credentials or incorrect role.";
                message.style.color = "#ff4d4d";
            }
        });
    </script>
</body>

</html>
