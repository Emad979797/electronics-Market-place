<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | JSEK Marketplace</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;400;600&display=swap" rel="stylesheet">
</head>

<body class="auth-page">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <header class="navbar">
        <div class="logo">JSEK <span class="logo-accent">Marketplace</span></div>
        <div class="nav-links">
            <a href="index.html" class="text-link">Home Page</a>
            <a href="support.html" class="text-link">Technical Support</a>
            <a href="signup.html" class="btn-signup" style="text-decoration: none;">Sign Up</a>
        </div>
    </header>

    <main class="auth-container"
        style="flex: 1; display: flex; align-items: center; justify-content: center; padding: 60px 20px;">
        <div class="auth-card">
            <h2>Member Login</h2>
            <form id="loginForm" class="auth-form" novalidate>

                <div class="input-group" style="text-align: left; margin-bottom: 20px;">
                    <label id="portalLabel"
                        style="font-size: 0.8rem; color: #7f8c8d; font-weight: 600; margin-bottom: 12px; display: block; text-transform: uppercase; letter-spacing: 1px;">
                        Continue as:
                    </label>
                    <div id="accountsList"
                        style="display: flex; flex-direction: column; gap: 4px; max-height: 200px; overflow-y: auto; padding-right: 5px;">
                    </div>
                </div>

                <div class="input-group">
                    <input type="password" id="loginEmail" placeholder="Email Address (Hidden)" required
                        autocomplete="off">
                </div>
                <div class="input-group">
                    <input type="password" id="loginPassword" placeholder="Password" required
                        autocomplete="new-password">
                </div>
                <div class="input-group">
                    <select id="loginRole" required>
                        <option value="">Confirm Login Role</option>
                        <option value="buyer">Buyer</option>
                        <option value="seller">Seller</option>
                        <option value="vendor">Vendor</option>
                        <option value="admin">Admin</option>
                    </select>
                </div>
                <div class="input-group" style="display: flex; align-items: center; gap: 10px; margin: 15px 0;">
                    <input type="checkbox" id="rememberMe" style="width: 16px; height: 16px; accent-color: #2193b0;">
                    <label for="rememberMe" style="font-size: 0.9rem; color: #7f8c8d;">Remember me</label>
                </div>
                <button type="submit" id="loginBtn" class="btn-glow">Login Now</button>
            </form>

            <div id="loginMessage"
                style="margin-top: 15px; font-weight: 600; font-size: 0.85rem; text-align: center; min-height: 1.2rem; transition: 0.3s;">
            </div>

            <div class="auth-footer"
                style="margin-top: 25px; text-align: center; border-top: 1px solid rgba(0,0,0,0.05); padding-top: 20px;">
                <p style="font-size: 0.85rem; margin-bottom: 12px;">
                    <a href="forgot-password.html" class="text-link">Forgot your password?</a>
                </p>
                <p style="font-size: 0.85rem; color: #7f8c8d;">
                    Don't have an account? <a href="signup.html" class="text-link">Sign up here</a>
                </p>
            </div>
        </div>
    </main>

    <footer class="main-footer">
        <div class="footer-content">
            <div class="footer-section">
                <div class="logo">JSEK <span class="logo-accent">Marketplace</span></div>
                <p>&copy; 2026 JSEK Electronics. All rights reserved.</p>
            </div>
            <div class="footer-section">
                <h4>Our Team</h4>
                <ul class="collaborators" style="list-style: none; padding: 0;">
                    <li>Emad Al Nounou</li>
                    <li>Julia Cameron</li>
                    <li>Khaled Al Akili</li>
                    <li>Shefaa Alaghawani</li>
                </ul>
            </div>
        </div>
    </footer>

    <script>
        // Interactive background logic
        document.addEventListener('mousemove', (e) => {
            const x = (window.innerWidth / 2 - e.pageX) / 10;
            const y = (window.innerHeight / 2 - e.pageY) / 10;
            document.documentElement.style.setProperty('--mouse-x', x + 'px');
            document.documentElement.style.setProperty('--mouse-y', y + 'px');
        });

        const MAX_ATTEMPTS = 3;
        const LOCKOUT_MS = 7000;
        window.onload = function () {
            const roleSelect = document.getElementById('loginRole');
            const portalLabel = document.getElementById('portalLabel');
            // Select the container holding the accounts list to show/hide it
            const accountsContainer = document.getElementById('accountsList').parentElement;

            document.getElementById('loginForm').reset();

            // 1. Check for role in URL (this comes from your signup redirect)
            const urlParams = new URLSearchParams(window.location.search);
            let forcedRole = urlParams.get('role');

            // 2. If a role is in the URL, force the session to update to this new role
            if (forcedRole) {
                forcedRole = forcedRole.toLowerCase().trim();
                sessionStorage.setItem('requiredPortal', forcedRole);
            } else {
                // Otherwise, check if a portal role was already saved in the session
                forcedRole = sessionStorage.getItem('requiredPortal');
            }

            if (forcedRole) {
                const cleanedRole = forcedRole.toLowerCase().trim();

                // Set the dropdown and lock it
                roleSelect.value = cleanedRole;
                roleSelect.disabled = true;

                // Update the label text
                if (portalLabel) portalLabel.textContent = `Continue as ${cleanedRole}:`;

                // Show ONLY accounts matching this specific role
                renderAccountList(cleanedRole);
                if (accountsContainer) accountsContainer.style.display = "block";
            } else {
                // If no role is detected at all, hide the "Continue as" section
                if (accountsContainer) accountsContainer.style.display = "none";
            }

            // Lockout security check
            const lockoutUntil = localStorage.getItem('jsek_lockout_until');
            if (lockoutUntil && Date.now() < parseInt(lockoutUntil)) {
                window.location.replace("support.html");
            } else if (lockoutUntil) {
                localStorage.removeItem('jsek_lockout_until');
                localStorage.setItem('jsek_attempts', '0');
            }
        };

        function renderAccountList(filterRole) {
            const listContainer = document.getElementById('accountsList');
            const users = JSON.parse(localStorage.getItem('jsek_users')) || [];
            listContainer.innerHTML = "";

            // STRICT FILTERING: Match the role exactly
            const filtered = users.filter(u =>
                u.role.toLowerCase().trim() === filterRole.toLowerCase().trim()
            );

            if (filtered.length === 0) {
                // Hide container if no users exist for this specific role
                document.getElementById('accountsList').parentElement.style.display = "none";
                return;
            }

            filtered.forEach((user) => {
                const chip = document.createElement('div');
                chip.style = "padding: 10px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; transition: 0.2s; border-radius: 8px; border-bottom: 1px solid rgba(0,0,0,0.03);";

                chip.onclick = () => {
                    document.getElementById('loginEmail').value = user.email;
                    document.getElementById('loginPassword').focus();
                };

                chip.innerHTML = `
                <div style="display: flex; align-items: center; gap: 12px;">
                    <div style="width: 32px; height: 32px; background: #2193b0; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 600;">
                        ${user.fullName.charAt(0)}
                    </div>
                    <div>
                        <div style="font-weight: 600; font-size: 0.85rem; color: #2c3e50;">${user.fullName}</div>
                        <div style="font-size: 0.65rem; color: #7f8c8d; text-transform: uppercase; font-weight: 700;">${user.role}</div>
                    </div>
                </div>`;
                listContainer.appendChild(chip);
            });
        }

        document.getElementById('loginForm').addEventListener('submit', function (e) {
            e.preventDefault();
            const emailInput = document.getElementById('loginEmail').value.trim();
            const passwordInput = document.getElementById('loginPassword').value;
            const dropdownRole = document.getElementById('loginRole').value.toLowerCase().trim();
            const portalRole = (sessionStorage.getItem('requiredPortal') || "").toLowerCase().trim();
            const msg = document.getElementById('loginMessage');

            const users = JSON.parse(localStorage.getItem('jsek_users')) || [];
            const user = users.find(u => u.email === emailInput && u.password === passwordInput);

            if (user) {
                const accountRole = user.role.toLowerCase().trim();

                // Check Portal & Dropdown against Account Role
                if ((portalRole && accountRole !== portalRole) || (accountRole !== dropdownRole)) {
                    msg.textContent = `Access Denied: This is a ${user.role} account.`;
                    msg.style.color = "#ff4d4d";
                    return;
                }

                localStorage.setItem('jsek_attempts', '0');
                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('currentUser', JSON.stringify(user));
                msg.textContent = "Authorized. Redirecting...";
                msg.style.color = "#2ecc71";

                setTimeout(() => {
                    if (accountRole === 'admin') window.location.assign("admin_dashboard.html");
                    else if (accountRole === 'seller') window.location.assign("seller_dashboard.html");
                    else window.location.assign("index.html");
                }, 1000);

            } else {
                let attempts = parseInt(localStorage.getItem('jsek_attempts') || '0') + 1;
                localStorage.setItem('jsek_attempts', attempts);
                if (attempts >= MAX_ATTEMPTS) {
                    localStorage.setItem('jsek_lockout_until', (Date.now() + LOCKOUT_MS).toString());
                    msg.textContent = "Account Blocked! Redirecting...";
                    setTimeout(() => window.location.assign("support.html"), 1500);
                } else {
                    msg.textContent = `Invalid credentials. ${MAX_ATTEMPTS - attempts} attempts left.`;
                    msg.style.color = "#ff4d4d";
                }
            }
        });
    </script>
</body>

</html>
