<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | JSEK Marketplace</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;400;600&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body class="auth-page">
    <header class="navbar">
        <div class="logo">JSEK <span class="logo-accent">Marketplace</span></div>
        <div class="nav-links">
            <a href="index.html" class="text-link">Back to Home</a>
        </div>
    </header>

    <main class="auth-container">
        <div class="auth-card">
            <h2>Welcome Back</h2>
            <p>Please enter your details to sign in.</p>

            <form action="#" class="auth-form">
                <div class="input-group">
                    <input type="email" placeholder="Email Address" required>
                </div>
                <div class="input-group">
                    <input type="password" placeholder="Password" required>
                </div>
                <button type="submit" class="btn-glow">Secure Login</button>
            </form>

            <div class="auth-footer">
                <a href="forgot-password.html" class="text-link small">Forgot Password?</a>
                <p>New here? <a href="signup.html" class="text-link">Create an account</a></p>
            </div>
        </div>
    </main>
</body>

</html>
