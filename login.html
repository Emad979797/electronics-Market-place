<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | JSEK Marketplace</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;400;600&display=swap" rel="stylesheet">
    <style>
        .recent-accounts {
            margin-bottom: 20px;
            text-align: left;
        }

        .account-chip {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            transition: 0.3s;
            color: #333;
        }

        .account-chip:hover {
            background: rgba(46, 204, 113, 0.1);
            border-color: #2ecc71;
        }

        .account-avatar {
            width: 30px;
            height: 30px;
            background: #2ecc71;
            border-radius: 50%;
            margin-right: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
        }
    </style>
</head>

<body class="auth-page" style="display: flex; flex-direction: column; min-height: 100vh; margin: 0;">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <header class="navbar">
        <div class="logo">JSEK <span class="logo-accent">Marketplace</span></div>
        <div class="nav-links">
            <a href="index.html" class="text-link">Home Page</a>
            <a href="support.html" class="text-link">Technical Support</a>
        </div>
    </header>

    <main class="auth-container">
        <div class="auth-card">
            <h2>Member Login</h2>

            <div id="recentAccountsContainer" class="recent-accounts" style="display: none;">
                <p style="font-size: 0.8rem; color: #666; margin-bottom: 10px;">Continue as:</p>
                <div id="accountsList"></div>
                <hr style="border: 0; border-top: 1px solid #ddd; margin: 15px 0;">
            </div>

            <p>Enter your credentials to access your account.</p>

            <form id="loginForm" class="auth-form" autocomplete="off">
                <div class="input-group">
                    <input type="email" id="loginEmail" placeholder="Email Address" required
                        autocomplete="one-time-code">
                </div>
                <div class="input-group">
                    <input type="password" id="loginPassword" placeholder="Password" required
                        autocomplete="new-password">
                </div>
                <div class="input-group">
                    <select id="loginRole" required>
                        <option value="">Login as...</option>
                        <option value="buyer">Buyer</option>
                        <option value="seller">Seller</option>
                        <option value="vendor">Vendor</option>
                        <option value="admin">Admin</option>
                    </select>
                </div>

                <div class="input-group"
                    style="display: flex; align-items: center; gap: 10px; margin-bottom: 20px; padding-left: 2px;">
                    <input type="checkbox" id="rememberMe"
                        style="width: 16px; height: 16px; cursor: pointer; accent-color: #2ecc71;">
                    <label for="rememberMe"
                        style="color: #333333; font-size: 0.9rem; font-weight: 400; cursor: pointer; user-select: none;">
                        Remember Me
                    </label>
                </div>

                <button type="submit" class="btn-glow">Login Now</button>
            </form>

            <div id="loginMessage" style="margin-top: 15px; font-weight: 600; font-size: 0.9rem; min-height: 1.2rem;">
            </div>

            <div class="auth-footer">
                <p><a href="forgot-password.html" class="text-link"
                        style="font-size: 0.85rem; display: block; margin-bottom: 10px;">Forgot Password?</a></p>
                <p>Don't have an account? <a href="signup.html" class="text-link">Sign up here</a></p>
            </div>
        </div>
    </main>

    <script>
        let loginAttempts = 0;
        const MAX_ATTEMPTS = 5;

        window.onload = function () {
            const saved = JSON.parse(localStorage.getItem('jsek_saved_credentials')) || [];
            if (saved.length > 0) {
                document.getElementById('recentAccountsContainer').style.display = 'block';
                saved.forEach(acc => {
                    const chip = document.createElement('div');
                    chip.className = 'account-chip';
                    chip.innerHTML = `<div class="account-avatar">${acc.name.charAt(0)}</div>
                        <div><div style="font-weight:600; font-size:0.85rem;">${acc.name}</div>
                        <div style="font-size:0.75rem; color:#666;">${acc.email}</div></div>`;
                    chip.onclick = () => {
                        document.getElementById('loginEmail').value = acc.email;
                        document.getElementById('loginPassword').value = acc.password;
                        document.getElementById('loginRole').value = acc.role;
                    };
                    document.getElementById('accountsList').appendChild(chip);
                });
            }
        };

        document.getElementById('loginForm').addEventListener('submit', function (e) {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value.trim();
            const role = document.getElementById('loginRole').value;
            const message = document.getElementById('loginMessage');
            const rememberMe = document.getElementById('rememberMe').checked;

            if (loginAttempts >= MAX_ATTEMPTS) {
                message.textContent = "Too many failed attempts. Locked.";
                message.style.color = "#ff4d4d";
                return;
            }

            let users = JSON.parse(localStorage.getItem('jsek_users')) || [];

            // Sync demo users
            if (!users.some(u => u.email === "admin@jsek.com")) {
                users.push({ email: "admin@jsek.com", password: "admin123", role: "admin", fullName: "Demo Admin" });
                localStorage.setItem('jsek_users', JSON.stringify(users));
            }

            const validUser = users.find(u => u.email === email && u.password === password && u.role === role);

            if (validUser) {
                let saved = JSON.parse(localStorage.getItem('jsek_saved_credentials')) || [];
                if (!saved.some(s => s.email === email)) {
                    saved.push({ email, password, name: validUser.fullName || "User", role });
                    localStorage.setItem('jsek_saved_credentials', JSON.stringify(saved));
                }

                message.textContent = "Success! Redirecting...";
                message.style.color = "#2ecc71";
                localStorage.setItem('currentUser', JSON.stringify(validUser));
                localStorage.setItem('isLoggedIn', 'true');

                setTimeout(() => {
                    if (role === 'admin') window.location.assign("admin_dashboard.html");
                    else if (role === 'buyer') window.location.assign("cart.html");
                    else window.location.assign("index.html");
                }, 1000);
            } else {
                loginAttempts++;
                message.textContent = "Error: Invalid credentials.";
                message.style.color = "#ff4d4d";
            }
        });
    </script>
</body>

</html>
