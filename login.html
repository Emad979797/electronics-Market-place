<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | JSEK Market place</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="favicon.png">
</head>

<body>
    <div class="wrap">
        <div class="topbar">
            <div class="brand">
                <div class="logo">JSEK</div>
                <div>
                    <div style="font-size:16px;">JSEK Market place</div>
                    <div class="subtitle">Secure Portal Login</div>
                </div>
            </div>
            <a href="index.html" class="badge" style="text-decoration: none;">← Back to home</a>
        </div>

        <div class="card">
            <div class="hero">
                <h1>Welcome Back</h1>
                <p>Please enter your credentials to access your specific dashboard.</p>
            </div>

            <div style="padding: 26px;">
                <form id="loginForm" onsubmit="handleLogin(event)">

                    <div style="margin-bottom: 20px;">
                        <label style="display: block; margin-bottom: 8px; font-weight: 600; font-size: 14px;">I am
                            logging in as:</label>
                        <select id="loginRole" required
                            style="width: 100%; padding: 12px; border-radius: 10px; border: 1px solid rgba(2,6,23,.15); font-size: 15px; background: white;">
                            <option value="buyer">🧾 Buyer</option>
                            <option value="seller">🛍️ Seller</option>
                            <option value="vendor">🏢 Vendor</option>
                            <option value="admin">🛡️ Admin</option>
                        </select>
                    </div>

                    <div style="margin-bottom: 20px;">
                        <label style="display: block; margin-bottom: 8px; font-weight: 600; font-size: 14px;">Email
                            Address</label>
                        <input type="email" required placeholder="yourname@email.com"
                            style="width: 100%; padding: 12px; border-radius: 10px; border: 1px solid rgba(2,6,23,.15); font-size: 15px;">
                    </div>

                    <div style="margin-bottom: 20px;">
                        <div
                            style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                            <label style="font-weight: 600; font-size: 14px;">Password</label>
                            <a href="#"
                                style="font-size: 12px; color: var(--JSEK-blue); text-decoration: none;">Forgot?</a>
                        </div>
                        <input type="password" required placeholder="••••••••"
                            style="width: 100%; padding: 12px; border-radius: 10px; border: 1px solid rgba(2,6,23,.15); font-size: 15px;">
                    </div>

                    <button type="submit" class="btn btn-glow"
                        style="width: 100%; justify-content: center; padding: 14px;">
                        Secure Login
                    </button>
                </form>
            </div>

            <div class="footer" style="justify-content: center; border-top: 1px solid rgba(2,6,23,.08);">
                <div>New to JSEK? <a href="signup.html"
                        style="color: var(--JSEK-blue); font-weight: 700; text-decoration: none;">Create an account</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        function handleLogin(event) {
            event.preventDefault();
            const role = document.getElementById('loginRole').value;

            // In a real project, you'd verify the password here.
            // For now, we redirect based on the role selected.
            alert("Authenticated! Redirecting to " + role.toUpperCase() + " Dashboard...");

            // Logic for your group members to use:
            // window.location.href = role + "-dashboard.html";
        }
    </script>
</body>

</html>
