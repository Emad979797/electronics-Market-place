<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | JSEK Marketplace</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;400;600&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body class="auth-page">
    <header class="navbar">
        <div class="logo">JSEK <span class="logo-accent">Marketplace</span></div>
        <div class="nav-links">
            <a href="login.html" class="text-link">Back to Login</a>
        </div>
    </header>

    <main class="auth-container">
        <div class="auth-card">
            <h2>Reset Password</h2>
            <p>Enter your email and we'll send you a link to get back into your account.</p>

            <form action="#" class="auth-form">
                <div class="input-group">
                    <input type="email" placeholder="Registered Email Address" required>
                </div>
                <button type="submit" class="btn-glow">Send Reset Link</button>
            </form>

            <div class="auth-footer">
                <p>Remembered your password? <a href="login.html" class="text-link">Return to Login</a></p>
            </div>
        </div>
    </main>
</body>

</html>
