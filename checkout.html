<main class="auth-container"
    style="flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 20px;">
    <div class="auth-card" style="width: 100%; max-width: 500px;">

        <div id="checkout-content">
            <h2>Secure Checkout</h2>
            <p>Select your payment method and enter details.</p>

            <form id="payment-form" class="auth-form">
                <div style="display: flex; gap: 15px; margin-bottom: 20px;">
                    <label
                        style="flex: 1; text-align: center; padding: 10px; border: 1px solid #ddd; border-radius: 8px; cursor: pointer;">
                        <input type="radio" name="payment" value="card" checked> Credit Card
                    </label>
                    <label
                        style="flex: 1; text-align: center; padding: 10px; border: 1px solid #ddd; border-radius: 8px; cursor: pointer;">
                        <input type="radio" name="payment" value="paypal"> PayPal
                    </label>
                </div>

                <div class="input-group">
                    <input type="text" placeholder="Cardholder Name" required>
                </div>
                <div class="input-group">
                    <input type="text" placeholder="Card Number" required>
                </div>
                <div style="display: flex; gap: 10px;">
                    <div class="input-group" style="flex: 2;">
                        <input type="text" placeholder="MM/YY" required>
                    </div>
                    <div class="input-group" style="flex: 1;">
                        <input type="text" placeholder="CVV" required>
                    </div>
                </div>

                <button type="submit" class="btn-glow">Pay Now</button>
            </form>
        </div>

    </div>
</main>
