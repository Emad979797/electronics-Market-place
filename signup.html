<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up | JSEK Market place</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="favicon.png">
</head>

<body>
    <div class="wrap">
        <div class="topbar">
            <div class="brand">
                <div class="logo">JSEK</div>
                <div>
                    <div style="font-size:16px;">JSEK Market place</div>
                    <div class="subtitle">Electronics Store — User Registration</div>
                </div>
            </div>
            <a href="index.html" class="badge" style="text-decoration: none;">← Back to Home</a>
        </div>

        <div class="card">
            <div class="hero">
                <h1>Create Your Account</h1>
                <p>Join our marketplace today. Please select your role carefully.</p>
            </div>

            <div style="padding: 26px;">
                <form id="signupForm" onsubmit="handleSignup(event)">

                    <div style="margin-bottom: 20px;">
                        <label style="display: block; margin-bottom: 8px; font-weight: 600; font-size: 14px;">Email
                            Address</label>
                        <input type="email" name="email" required placeholder="name@example.com"
                            style="width: 100%; padding: 12px; border-radius: 10px; border: 1px solid rgba(2,6,23,.15); font-size: 15px;">
                    </div>

                    <div style="margin-bottom: 20px;">
                        <label
                            style="display: block; margin-bottom: 8px; font-weight: 600; font-size: 14px;">Password</label>
                        <input type="password" name="password" required placeholder="Min. 8 characters"
                            style="width: 100%; padding: 12px; border-radius: 10px; border: 1px solid rgba(2,6,23,.15); font-size: 15px;">
                    </div>

                    <div style="margin-bottom: 26px;">
                        <label style="display: block; margin-bottom: 8px; font-weight: 600; font-size: 14px;">Register
                            as a:</label>
                        <select name="role" required
                            style="width: 100%; padding: 12px; border-radius: 10px; border: 1px solid rgba(2,6,23,.15); font-size: 15px; background: white; cursor: pointer;">
                            <option value="" disabled selected>Select your role</option>
                            <option value="buyer">🛒 Buyer (Purchase products)</option>
                            <option value="seller">🛍️ Seller (Individual listings)</option>
                            <option value="vendor">🏢 Vendor (Business/Wholesale)</option>
                            <option value="admin">🛡️ Admin (System Management)</option>
                        </select>
                    </div>

                    <button type="submit" class="btn btn-glow"
                        style="width: 100%; justify-content: center; padding: 14px;">
                        Secure Login
                    </button>
                </form>
            </div>

            <div class="footer" style="justify-content: center; border-top: 1px solid rgba(2,6,23,.08);">
                <div>
                    Already a member?
                    <a href="login.html" style="color: var(--JSEK-blue); font-weight: 700; text-decoration: none;">Log
                        In here</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        function handleSignup(event) {
            event.preventDefault();

            // Get the form data
            const formData = new FormData(event.target);
            const email = formData.get('email');
            const role = formData.get('role');

            // Professional confirmation message
            alert(`Account created for ${email} as a ${role.toUpperCase()}!`);

            // Redirect back to home page
            window.location.href = "index.html";
        }
    </script>
</body>

</html>
